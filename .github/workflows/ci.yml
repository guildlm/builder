name: ci

on:
  push:
  pull_request:

jobs:
  go:
    name: Go example (vet/build/test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/tasks-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
      - run: go test -race ./...

  python:
    name: Python harness (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]'
      - run: python -m pytest -q
