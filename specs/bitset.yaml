name: bitset
language: go
go_module: guildlm.dev/bitset
description: >-
  A small, idiomatic, STANDARD-LIBRARY-ONLY bit set (a compact set of
  non-negative integers backed by a []uint64 word slice). No external
  dependencies — use math/bits for population count. All files use package
  bitset. This is a library (no HTTP, no main).
files:
  - path: go.mod
    purpose: >-
      Go module file. Module path guildlm.dev/bitset, go 1.23. No dependencies.
      Output as a ```mod block, not Go.

  - path: bitset.go
    purpose: >-
      package bitset. A BitSet backed by words []uint64. Each integer i lives in
      word index i/64 at bit position i%64, so its mask is uint64(1) <<
      uint(i%64). New() *BitSet returns an empty set. Set(i int) sets bit i,
      GROWING the words slice with append/make so len(words) > i/64 before
      indexing (never index out of range). Clear(i int) clears bit i (if i/64 is
      beyond the current words, it is already clear — do nothing, do not panic).
      Test(i int) bool reports whether bit i is set (false when i/64 is beyond the
      slice). Count() int returns the number of set bits, summed across words with
      bits.OnesCount64 (import math/bits). Union(other *BitSet) *BitSet returns a
      NEW BitSet whose words are the bitwise OR of the two (handle differing
      lengths — the result is as long as the longer operand). Do not mutate either
      receiver in Union. Assume i >= 0. Standard library only (math/bits).

  - path: bitset_test.go
    purpose: >-
      package bitset. Focused tests; each builds its own set with New. Transcribe
      these exact scenarios.
      TestSetTestClear: b := New(); b.Set(1); b.Set(65); // 65 is in the SECOND
      word, bit 1. Assert b.Test(1) is true, b.Test(65) is true, b.Test(2) is
      false, and b.Test(200) is false (beyond the slice). Then b.Clear(200) — an
      index whose word i/64 is BEYOND the words slice — and assert it DOES NOT PANIC
      and b.Test(200) is STILL false afterward: Clear must guard the out-of-range word
      exactly as Test does (if i/64 >= len(words) the bit is already clear, so do
      nothing). Without that guard Clear(200) indexes past the words slice and PANICS
      at runtime, while every other assertion in this test still passes. Then
      b.Clear(1); assert b.Test(1) is false and b.Test(65) is still true.
      TestCount: b := New(); b.Set(0); b.Set(1); b.Set(63); b.Set(64); assert
      b.Count() == 4.
      TestUnion: a := New(); a.Set(1); a.Set(2); c := New(); c.Set(2); c.Set(130);
      u := a.Union(c); assert u.Test(1), u.Test(2), u.Test(130) are all true and
      u.Count() == 3; also assert a.Test(130) is false (Union did not mutate a).
      Standard library only.
