name: shortener
language: go
go_module: guildlm.dev/shortener
description: >-
  A realistic, idiomatic, STANDARD-LIBRARY-ONLY URL shortener backend — the
  classic interview-grade Go service. No external dependencies whatsoever:
  net/http and its ServeMux for routing (never a third-party router),
  encoding/json for bodies, sync for concurrency. All files use package main.
  The service layers cleanly: a base62 code generator, a goroutine-safe store,
  JSON handlers (shorten + resolve + stats), a router, and a main with graceful
  shutdown.
files:
  - path: go.mod
    purpose: >-
      Go module file. Module path guildlm.dev/shortener, go 1.23. No
      dependencies. Output as a ```mod block, not Go.
  - path: codec.go
    purpose: >-
      package main. Base62 encoding for short codes. A const alphabet
      "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ" (index 0 is
      '0', index 10 is 'a', index 61 is 'Z').
      Encode(n uint64) string: if n == 0 return the single character alphabet[0]
      ("0"). Otherwise take digits by n%62 while dividing n by 62 — this produces
      the LEAST-significant digit first, so you MUST emit them MOST-significant
      first: either prepend alphabet[n%62] to the front each iteration, or collect
      then REVERSE before returning. A correct result has Encode(62) == "10"
      (because 62 = 1*62 + 0), never "01".
      Decode(s string) (uint64, error): result := uint64(0); for each byte c in s,
      find its index i in the alphabet (return the sentinel ErrBadCode, matchable
      with errors.Is, for an empty string or any char not in the alphabet); set
      result = result*62 + uint64(i); return result.
      Encode and Decode MUST be exact inverses: Decode(Encode(n)) == n for every n.
      Standard library only.
  - path: store.go
    purpose: >-
      package main. The data layer. A Link struct {Code, URL string; Hits int}.
      A goroutine-safe MemStore backed by a map[string]Link guarded by
      sync.RWMutex plus a uint64 sequence counter, built by NewMemStore()
      *MemStore. Save(url string) Link assigns the next sequence number,
      encodes it with Encode to produce the code, stores and returns the Link.
      Resolve(code string) (Link, error) returns the link and increments its
      Hits count, or a sentinel ErrNotFound (errors.Is-matchable) when absent.
      Stats(code string) (Link, error) returns the link WITHOUT touching Hits,
      or ErrNotFound. Standard library only.
  - path: handlers.go
    purpose: >-
      package main. JSON handlers over a *MemStore. A LinkHandler struct
      holding a *MemStore, built by NewLinkHandler(*MemStore). Methods that are
      http.HandlerFunc: Shorten decodes {"url": "..."} from the body, returns
      400 on malformed JSON or when the url field is empty or fails
      url.ParseRequestURI, otherwise saves and returns 201 with the Link as
      JSON; Redirect reads the {code} path value via r.PathValue and responds
      http.StatusMovedPermanently with the Location header set to the stored
      URL, or 404 (errors.Is ErrNotFound); Stats returns the Link for {code}
      as JSON with 200, or 404. Use a small writeJSON(w, status, v) helper.
      Standard library only.
  - path: router.go
    purpose: >-
      package main. func NewRouter(s *MemStore) http.Handler that builds an
      http.ServeMux (NOT a third-party router) mapping "POST /shorten" ->
      Shorten, "GET /r/{code}" -> Redirect, "GET /stats/{code}" -> Stats, and
      "GET /health" -> 200 "ok". Return the mux so tests can exercise the
      fully-wired handler. Standard library only.
  - path: main.go
    purpose: >-
      package main. func main() constructs a MemStore and NewRouter, runs an
      *http.Server on :8080, and shuts down gracefully: use
      signal.NotifyContext(context.Background(), os.Interrupt) and on
      ctx.Done() call srv.Shutdown with a short context.WithTimeout so
      in-flight requests drain. Standard library only.
  - path: shortener_test.go
    purpose: >-
      package main. Tests using net/http/httptest. Construct a FRESH
      NewRouter(NewMemStore()) inside every t.Run subtest — no shared server
      across cases. Unit-test the codec with EXACTLY this round-trip structure —
      do NOT use a table with an "expected" encoded-string field, and do NOT write
      any assertion of the form `Encode(n) == "someliteral"` (hand-computing
      base62 is error-prone; the round trip is the only invariant):
      `for _, n := range []uint64{0, 1, 61, 62, 1234567890} { code := Encode(n);
      got, err := Decode(code); if err != nil { t.Fatalf("Decode(%q): %v", code,
      err) }; if got != n { t.Errorf("round trip %d -> %q -> %d", n, code, got) }
      }`. Separately assert Encode(0) == "0". Then assert Decode("!") and
      Decode("") EACH return ErrBadCode via errors.Is (an empty string and any
      character outside the alphabet are invalid input). Flow-test the API: POST /shorten with a
      valid JSON url returns 201 and a non-empty code; GET /r/{code} returns
      301 with the Location header equal to the original url; GET /r/missing
      returns 404; POST /shorten with malformed JSON or an empty url returns
      400. The Hits/stats test MUST first register a hit: POST /shorten to get
      the code, then GET /r/{code} EXACTLY ONCE (this is what increments Hits),
      and ONLY THEN GET /stats/{code} and assert the decoded Hits == 1. Do NOT
      check stats without a preceding redirect — a freshly created link has Hits
      0, so a stats check with no prior GET /r/{code} would see 0, not 1. Decode
      JSON responses and assert fields. Standard library only.
