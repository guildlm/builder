# Spec for the tasks-api reference backend. With a capable coder model, the
# GuildLM Builder loop regenerates something equivalent to examples/tasks-api/.
name: tasks-api-noshadownudge
language: go
go_module: guildlm.dev/tasks-api
description: >-
  A clean, idiomatic, stdlib-only Go REST API for a "tasks" service. Use only
  net/http, encoding/json, sync, and the rest of the standard library — no
  external dependencies. Use Go 1.22+ http.ServeMux method+pattern routing
  (e.g. "GET /tasks/{id}" with r.PathValue("id")). All files share package main.

files:
  - path: go.mod
    purpose: >-
      Go module file. Module path guildlm.dev/tasks-api, go 1.23. No
      dependencies. Output as a ```mod block, not Go.

  - path: task.go
    purpose: >-
      package main. Defines the Task model (ID int, Title string, Done bool,
      CreatedAt time.Time) with json tags, a sentinel ErrInvalidTask, and a
      Validate() method that wraps ErrInvalidTask via fmt.Errorf("%w", ...) when
      the trimmed Title is empty.

  - path: store.go
    purpose: >-
      package main. Declare EXACTLY these three things, with EXACTLY these names —
      the interface and the concrete type MUST NOT share a name or the package
      will not compile:
      (1) `type Store interface` declaring ALL FIVE methods: Create(t Task) error,
      Get(id int) (Task, error), List() []Task, Update(t Task) error,
      Delete(id int) error. Update MUST be there — the handlers call store.Update,
      so omitting it breaks the build.
      (2) `type MemStore struct` — the thread-safe in-memory implementation,
      guarded by sync.RWMutex with a map[int]Task and an auto-incrementing nextID.
      Implement ALL FIVE methods on *MemStore (pointer receivers, since they take
      the mutex): Create validates and assigns ID + CreatedAt; List returns a copy
      sorted by ID; Get/Update/Delete return the sentinel ErrNotFound when the id
      is absent; Update preserves the existing ID/CreatedAt and overwrites
      Title/Done. Add `var _ Store = (*MemStore)(nil)`.
      (3) `func NewStore() Store { return &MemStore{...} }` — the constructor is
      named EXACTLY `NewStore` (NOT NewMemStore); the handlers and every test call
      that name, so any other name breaks the build.

  - path: handlers.go
    purpose: >-
      package main. An API type holding the Store INTERFACE by value (field
      `store Store`, and `func NewAPI(store Store) *API`) — never `*Store`, which
      is a pointer to an interface and has no methods. HTTP handler
      methods Create, List, Get, Update, Delete using encoding/json. EVERY
      handler method has EXACTLY the http.HandlerFunc signature
      `(w http.ResponseWriter, r *http.Request)` and returns NOTHING — it reads
      the id itself via r.PathValue("id") (strconv.Atoi it) and decodes the body
      itself; it takes NO extra parameters (no id, no Task) beyond w and r.
      Correct status codes 201/200/204/400/404. Error bodies are JSON
      {"error":"..."}. Map ErrNotFound to 404 and ErrInvalidTask to 400 with
      errors.Is.

  - path: router.go
    purpose: >-
      package main. NewRouter(api *API) *http.ServeMux registering POST /tasks,
      GET /tasks, GET /tasks/{id}, PUT /tasks/{id}, DELETE /tasks/{id}. Register
      each handler by passing the METHOD VALUE directly to mux.HandleFunc, e.g.
      `mux.HandleFunc("PUT /tasks/{id}", api.Update)` — do NOT call the handler
      and do NOT pass w, r, an id, or a Task yourself (the handler reads those
      from the request). Each api.Method is used as an http.HandlerFunc value,
      never invoked, inside NewRouter.

  - path: main.go
    purpose: >-
      package main. Wires Store + API + router, reads PORT (default 8080),
      starts http.Server and shuts down gracefully on SIGINT/SIGTERM using
      signal.NotifyContext and server.Shutdown.

  - path: store_test.go
    purpose: >-
      package main. Tests for the store written as SEPARATE FOCUSED functions
      (NOT one shared table loop), each building its OWN fresh store via
      NewStore(). Task.ID is an INT and the store ASSIGNS the id on Create (the
      first created task gets id 1); never assign a string where an int id is
      expected. Cover exactly:
      TestStoreCreateGet: create a task with Title "a"; then Get id 1 and assert
      its Title == "a".
      TestStoreListSorted: create Title "b" FIRST, then Title "a". List is sorted
      by ID (NOT by title), and ids are assigned in creation order, so the result
      is EXACTLY: len 2, list[0].ID == 1 && list[0].Title == "b", list[1].ID == 2
      && list[1].Title == "a". Assert those exact values — do NOT expect the
      titles in alphabetical order.
      TestStoreUpdateDelete: create a task with Title "a". NOTE Create takes the
      Task BY VALUE and the store assigns the id internally, so your local
      variable does NOT come back with an ID — to update it you must first
      `got, err := s.Get(1)`, then set got.Title = "b" and call s.Update(got).
      (Calling Update on the value you passed to Create sends ID 0 and returns
      ErrNotFound.) Then assert Get id 1 has Title "b"; Delete id 1; then Get id 1
      returns ErrNotFound (errors.Is).
      TestStoreMissing: on a FRESH store, Get/Update/Delete of id 99 each return
      ErrNotFound.
      TestStoreConcurrent: launch many goroutines that each Create a task, join
      with a sync.WaitGroup, then assert the count; safe under -race.
      Declare every local with
      := and USE it (no unused variables). Standard library only.

  - path: handlers_test.go
    purpose: >-
      package main. httptest tests written as SEPARATE FOCUSED functions, each
      building its OWN fresh handler with the project's constructors (e.g. h :=
      NewRouter(NewAPI(NewStore()))). Task.ID is an int, so request paths use the
      integer form like "/tasks/1", and a fresh request body is built for every
      request. Cover exactly:
      TestCreate201: POST /tasks with a valid JSON body -> 201, and the response
      body echoes the created task (with its assigned id).
      TestGetOKAndMissing: POST a task, then GET /tasks/1 -> 200 with the stored
      fields; on a fresh handler GET /tasks/99 -> 404.
      TestList200: POST one task, then GET /tasks -> 200 with a JSON array.
      TestDelete: POST a task, DELETE /tasks/1 -> 204, then GET /tasks/1 -> 404.
      TestInvalid400: POST /tasks with malformed JSON (truncated bytes like
      `{"title":`) -> 400.
      Declare every local with :=
      and USE it (no unused variables). Standard library only.
