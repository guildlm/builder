name: taskapipro
language: go
go_module: guildlm.dev/taskapipro
description: >-
  A production-grade, STANDARD-LIBRARY-ONLY Go backend with clean architecture:
  a proper service layer between HTTP handlers and the repository, so business
  rules live in one place and every layer depends on an INTERFACE below it
  (handlers -> service interface -> store interface). No external dependencies:
  net/http Go 1.22 ServeMux, log/slog structured logging, context, encoding/json,
  sync. Multi-package layout (cmd/ + internal/{config,models,store,service,api}).
  Packages depend inward only; cross-package symbols are used by importing the
  package and qualifying (models.Task, store.Store, service.TaskService,
  store.ErrNotFound). Only exported names cross package boundaries.
files:
  - path: go.mod
    purpose: >-
      Go module file. Module path guildlm.dev/taskapipro, go 1.23. No
      dependencies. Output as a ```mod block, not Go.
  - path: internal/config/config.go
    purpose: >-
      package config. Config struct { Addr string; ReadTimeout, WriteTimeout,
      ShutdownTimeout time.Duration; DefaultPageSize, MaxPageSize int } and
      func Load() (Config, error) — it returns TWO values, a Config AND an error.
      Read EXACTLY these env vars, by these names: ADDR, READ_TIMEOUT,
      WRITE_TIMEOUT, SHUTDOWN_TIMEOUT, DEFAULT_PAGE_SIZE, MAX_PAGE_SIZE. Defaults:
      Addr ":8080", timeouts 5s/10s/10s, DefaultPageSize 20, MaxPageSize 100.
      An EMPTY env var is treated EXACTLY like an UNSET one — use the default.
      Parse durations with time.ParseDuration and the page sizes with strconv.Atoi.
      If a var is PRESENT but FAILS TO PARSE, return the ZERO Config and a NON-NIL
      error (fmt.Errorf wrapping with %w) — do NOT silently fall back. Finally call
      c.Validate() and, if it returns an error, return the ZERO Config and that
      error. A method (c Config) Validate() error returning an error if Addr is
      empty or MaxPageSize < DefaultPageSize. Imports os, strconv, time, fmt. No
      other project package.
  - path: internal/config/config_test.go
    purpose: >-
      package config. Load() is the seam every deployment goes through. Write
      EXACTLY these five test functions and NO OTHERS — do not invent extra cases.
      Load() returns TWO values: write `cfg, err := Load()`.
      Use t.Setenv (never os.Setenv); a test that calls t.Setenv must NOT call
      t.Parallel. Compare durations against time.Second multiples (5*time.Second),
      never against integers.
      TestLoadDefaults — with no environment set, Load() returns a nil error and
      the documented defaults: Addr ":8080", DefaultPageSize 20, MaxPageSize 100.
      TestLoadFromEnv — t.Setenv ADDR ":9090", READ_TIMEOUT "30s", WRITE_TIMEOUT
      "40s", SHUTDOWN_TIMEOUT "50s", DEFAULT_PAGE_SIZE "5" and MAX_PAGE_SIZE "50";
      Load() returns a nil error and ALL SIX of those values. The three duration
      vars are structural MIRRORS of one another — exercise all three, not just
      the first; a mirror nobody exercises is a branch nobody has shown to work.
      TestLoadInvalidDuration — t.Setenv READ_TIMEOUT to "not-a-duration"; Load()
      returns a NON-NIL error (it does not silently fall back).
      TestValidateRejectsMaxBelowDefault — build a Config VALUE DIRECTLY with a
      field-named literal whose MaxPageSize is less than its DefaultPageSize (e.g.
      DefaultPageSize 20, MaxPageSize 19, with the other fields sane) and call
      Validate() on it: it must return a non-nil error. Do NOT call Load() here.
      Load VALIDATES before it returns, so it can never hand you back an invalid
      Config: on failure it returns the ZERO Config, whose MaxPageSize and
      DefaultPageSize are both 0 — and 0 < 0 is false, so Validate would correctly
      return nil and the test would fail against a correct implementation. An
      invalid Config is UNREACHABLE through Load by construction. Validate's
      contract is about a Config value; test it on a Config value.
      TestValidateOK — a sane Config passes Validate(). Build it the same way, as
      a direct field-named literal.
      Do NOT write a test that expects Load() to BOTH return an error AND hand
      back populated defaults: when Load fails it returns the zero Config, so
      those two expectations contradict each other and no implementation can
      satisfy both. Imports testing only. Do not name any local variable `t`.
  - path: internal/models/models.go
    purpose: >-
      package models. Task struct {ID, Title, Status, ProjectID string} and
      Project struct {ID, Name string} with JSON tags. Valid Task.Status is
      "todo"|"doing"|"done". Exported sentinel var ErrInvalid =
      errors.New("invalid"). Methods (t Task) Validate() error and (p Project)
      Validate() error wrapping ErrInvalid via fmt.Errorf("%w: ...") on empty
      Title/Name or bad Status. Imports errors, fmt only.
  - path: internal/models/models_test.go
    purpose: >-
      package models. Unit-test the validation rules directly — they are the
      domain's contract and every other package trusts them.
      Write SEPARATE FOCUSED TEST FUNCTIONS.
      ONE TEST FUNCTION, ONE OUTCOME. Every case inside a function must expect the
      SAME KIND of result, because the assertion is SHARED: a function whose check
      is "the error must be non-nil" cannot also carry a case that expects nil —
      that case is unsatisfiable by construction and fails against a CORRECT
      implementation. If you write a table, every row in it expects the same thing.
      TestTaskValidateOK: a Task with a non-empty Title returns nil. Assert that
      for EACH of the three valid statuses "todo", "doing" and "done". Every case
      in this function expects NIL.
      TestTaskValidateEmptyTitle: a Task with an empty Title returns an error that
      errors.Is(err, ErrInvalid).
      TestTaskValidateBadStatus: a Task whose Status is INVALID (e.g. "banana")
      returns an error that errors.Is(err, ErrInvalid). Every case in this function
      expects an ERROR — so NEVER put a valid status ("todo"/"doing"/"done") in it.
      A valid status correctly returns nil and would fail this function's assertion.
      TestProjectValidateOK: a Project with a non-empty Name returns nil.
      TestProjectValidateEmptyName: a Project with an empty Name returns an error
      that errors.Is(err, ErrInvalid).
      Write every struct value with FIELD NAMES. Imports errors and testing only.
  - path: internal/store/store.go
    purpose: >-
      package store. Import the models package (guildlm.dev/taskapipro/internal/
      models) and use models.Task/models.Project qualified. Exported sentinels
      var ErrNotFound and var ErrExists (errors.New). A CONTEXT-AWARE Store
      INTERFACE (every method takes context.Context as its FIRST parameter, the
      production repository convention): CreateTask(ctx context.Context, t
      models.Task) error, GetTask(ctx context.Context, id string) (models.Task,
      error), ListTasks(ctx context.Context) ([]models.Task, error),
      DeleteTask(ctx context.Context, id string) error, and the same four for
      Project. Imports context, errors, and the models package only.
  - path: internal/store/memory.go
    purpose: >-
      package store. Goroutine-safe in-memory Store impl (same package —
      reference Store, ErrNotFound, ErrExists directly, do NOT redeclare). Every
      method takes ctx context.Context as its first parameter to satisfy the
      Store interface (the in-memory impl may ignore ctx, but MUST accept it).
      MemStore struct with two maps guarded by one sync.RWMutex, built by
      NewMemStore() *MemStore. Create->ErrExists on dup id; Get/Delete->
      ErrNotFound; List returns (items, nil) id-sorted. IMPLEMENT ALL EIGHT
      METHODS FULLY — the four Project methods (CreateProject/GetProject/
      ListProjects/DeleteProject) MIRROR the four Task methods with identical
      map/mutex/error logic on the projects map. Do NOT stub any method with a
      placeholder (no ErrNotImplemented, no panic, no TODO). Use models types
      (import models). var _ Store = (*MemStore)(nil). Imports context, sort,
      sync, and the models package.
  - path: internal/store/memory_test.go
    purpose: >-
      package store. Tests for MemStore (same package; use models via import).
      Pass context.Background() to every store method call.
      Write SEPARATE FOCUSED TEST FUNCTIONS — NOT one shared table loop. Each
      builds its OWN fresh NewMemStore. A fresh store is EMPTY, so any case with a
      precondition must CREATE it FIRST, in its own body:
      TestCreateOK: CreateTask -> nil error.
      TestCreateDuplicate: CreateTask ONCE (expect nil), then CreateTask the SAME
      id AGAIN -> ErrExists (errors.Is). Without the first create there is nothing
      to duplicate and the second one succeeds.
      TestGetExisting: CreateTask FIRST, then GetTask that id -> nil error and the
      stored fields. (On a store nobody wrote to, Get returns ErrNotFound and the
      case fails no matter how correct MemStore is.)
      TestGetMissing: on a fresh store, GetTask an unknown id -> ErrNotFound.
      TestListSorted: CreateTask two tasks, then ListTasks -> id-sorted.
      TestDelete: CreateTask FIRST, DeleteTask it -> nil, then GetTask ->
      ErrNotFound.
      TestDeleteMissing: on a fresh store, DeleteTask an unknown id -> ErrNotFound.
      Then the SAME seven cases for the PROJECT half of the store, which is
      currently never exercised at all — the store is exactly 50% covered because
      these methods are never called, and a method nobody calls is a method nobody
      has shown to be correct:
      TestCreateProjectOK, TestCreateProjectDuplicate (create ONCE, then the SAME
      id again -> ErrExists), TestGetProjectExisting (create FIRST, then get),
      TestGetProjectMissing (-> ErrNotFound), TestListProjectsSorted (create two,
      then list id-sorted), TestDeleteProject (create FIRST, delete, then get ->
      ErrNotFound), TestDeleteProjectMissing (-> ErrNotFound). Each builds its OWN
      fresh NewMemStore and seeds its own precondition, exactly as above.
      Compare a []models.Task with reflect.DeepEqual or by looping over the
      elements — a slice has NO Equal method, so `want.Equal(got)` does not
      compile. Imports context, errors, testing, and models. Never
      name a local variable `t` — the test's *testing.T is `t`, so use `task` or
      `tk` for a models.Task, never `t := models.Task{...}` (that shadows the
      tester and makes t.Fatalf resolve to models.Task). Write every models.Task
      with FIELD NAMES (models.Task{ID: "1", Title: "x", Status: "todo",
      ProjectID: "p1"}), never a positional literal and never a bare "" where a
      Task value is expected.
  - path: internal/service/service.go
    purpose: >-
      package service. The business-logic layer between handlers and store.
      Import context and the store and models packages. Every method takes ctx
      context.Context first and PASSES ctx through to the matching store method
      (whose signatures are context-first — call them EXACTLY as declared, e.g.
      s.store.CreateTask(ctx, t)). Define a TaskService INTERFACE (Create(ctx
      context.Context, t models.Task) (models.Task, error); Get(ctx, id string)
      (models.Task, error); List(ctx, limit, offset int, status string)
      ([]models.Task, error); Delete(ctx, id string) error) and a ProjectService
      INTERFACE (Create/Get/List(ctx, limit, offset int)/Delete). Concrete
      UNEXPORTED taskService and projectService structs each holding a field
      named `store` of type store.Store (the INTERFACE, by value). Constructors
      exported NewTaskService(s store.Store) TaskService returning
      &taskService{store: s} (the struct-literal field name MUST be `store`, the
      declared field), and NewProjectService likewise. Create: call
      t.Validate() and on error return (models.Task{}, err); else call
      s.store.CreateTask(ctx, t) and on error return (models.Task{}, err); else
      return (t, nil). Get/Delete delegate to the store. List: fetch via
      s.store.ListTasks(ctx), apply status filtering on the CONCRETE
      []models.Task FIRST, THEN pass the filtered []models.Task to the generic helper
      paginate[T any](items []T, limit, offset int) []T.
      An EMPTY status means NO FILTER. Every caller that is not filtering passes
      "", and a bare `if t.Status == status` keeps NOTHING for them: List returns
      an empty slice and TestList/TestListLimit/TestListNegativeOffset all fail
      with `got [], want 1` against a store that really does hold the tasks. The
      guard is the first line of the loop, so here is the whole loop — write it:
        var filtered []models.Task
        for _, t := range items {
            if status != "" && t.Status != status {
                continue                      // "" => no filter, keep everything
            }
            filtered = append(filtered, t)
        }
      (accessing .Status is valid here because these are models.Task, not a type
      parameter). paginate ONLY slices by
      limit/offset, and it must be UNPANICKABLE on any (limit, offset) an HTTP
      query string can produce. "Never panic" is not a wish — it is THREE named
      guards, and the one most often dropped is the second:
        if offset >= len(items) { return []T{} }   // past the end -> empty
        if offset < 0 { offset = 0 }               // NEGATIVE offset clamps to 0;
                                                   // without this, items[-1:] PANICS
        if limit <= 0 || limit > len(items)-offset { limit = len(items) - offset }
      then `return items[offset : offset+limit]`. paginate
      must NEVER access any field or method of T (T is `any` — `item.Status`
      inside paginate does not compile). return (page, nil).
      Compile-time assertions var _ TaskService = (*taskService)(nil) etc.
      Imports context + the store + models packages.
  - path: internal/service/service_test.go
    purpose: >-
      package service. The TASK service only — the project service and the
      store-error tests live in project_service_test.go, in this same package, so
      that neither file has to be long. Do NOT write them here.
      BIND ONLY THE SERVICE. Construct the store INLINE inside the constructor
      call — `svc := NewTaskService(store.NewMemStore())` — so there is no store
      variable in scope to reach for. With both `s` and `svc` bound, the model
      seeds with `s.Create(...)`, and the store has no Create: it has CreateTask.
      Every call in this file goes to `svc`.
      Tests use NewTaskService(store.NewMemStore()) and the models package; pass
      context.Background() to every service method.
      Write SEPARATE FOCUSED TEST FUNCTIONS — NOT one shared table loop. ONE TEST
      FUNCTION ASSERTS ONE OUTCOME, and nothing else: do NOT chain a second check
      onto a test that already has one (a "create it, then also read it back"
      function reliably ships the create and drops the read). Each function builds
      its OWN fresh service, which starts EMPTY, so a case that needs a task to
      already exist must CREATE it first, in its own body.
      Every assertion states the EXACT expected value. Never assert "at most N":
      a paginate that wrongly returns ZERO items satisfies "at most 1" and the bug
      ships green. If you expect one item, require len(got) == 1.
      EIGHT test functions, all of them:
      TestCreateOK: Create a valid task -> no error.
      TestCreateInvalid: Create a task with a bad status -> the error is
      models.ErrInvalid (errors.Is).
      TestGetAfterCreate: Create a task FIRST, then Get its ID -> no error and the
      returned task's Title EQUALS the one created.
      TestGetMissing: Get an ID that was never created -> errors.Is(err,
      store.ErrNotFound).
      TestDeleteRemoves: Create a task FIRST, Delete its ID -> no error; then Get
      that same ID -> errors.Is(err, store.ErrNotFound).
      TestListLimit: Create TWO tasks FIRST, then List with limit=1, offset=0 ->
      EXACTLY 1 item.
      TestListFilterByStatus: Create one "todo" and one "done" task FIRST, then
      List filtered by status "done" -> EXACTLY 1 item and its Status is "done".
      TestListOffsetPastEnd: Create ONE task FIRST, then List with limit=10,
      offset=5 (an offset past the end) -> no error, no panic, EXACTLY 0 items.
      TestListNegativeOffset: Create ONE task FIRST, then List with limit=0 and
      offset=-1 -> no panic and EXACTLY 1 item (a negative offset clamps to 0).
      Not hypothetical: a paginate without the `offset < 0` clamp slices items[-1:]
      and panics at runtime, and every other test passes anyway.
      Imports context, errors, testing, and the store + models packages. Never
      name a local variable `t`.
  - path: internal/service/project_service_test.go
    purpose: >-
      package service. The PROJECT service, plus the two store-error tests — in
      their OWN file so neither test file has to be long. The project service is a
      MIRROR of the task service: the same four methods on the other type, and
      until this file existed, not one of them was ever called by a test. A mirror
      nobody runs is a branch nobody has shown to work.
      BIND ONLY THE SERVICE. Construct the store INLINE inside the constructor
      call — `svc := NewProjectService(store.NewMemStore())` — so there is no store
      variable in scope to reach for. Given both `s := store.NewMemStore()` and
      `svc := ...`, the model seeds with `s.Create(...)`, and the store has no
      Create: it has CreateProject. Every call in this file goes to `svc`.
      Tests use NewProjectService(store.NewMemStore()) and pass
      context.Background() to every method. Each function asserts ONE outcome and
      nothing else, and builds its OWN fresh service.
      SEVEN test functions. Write ALL SEVEN — the last two are the ones most often
      dropped, and they are the whole reason the fake below exists:
      TestProjectCreateOK: Create a valid project -> no error.
      TestProjectCreateInvalid: Create a project with an empty Name -> the error is
      models.ErrInvalid (errors.Is).
      TestProjectGetAfterCreate: Create a project FIRST, then Get its ID -> no
      error and the returned project's Name EQUALS the one created.
      TestProjectDeleteRemoves: Create a project FIRST, Delete its ID -> no error;
      then Get that same ID -> errors.Is(err, store.ErrNotFound).
      TestProjectListLimit: Create TWO projects FIRST, then List with limit=1,
      offset=0 -> EXACTLY 1 item.
      TestCreateStoreError: NewTaskService(failStore{}), Create a task that is
      VALID (an invalid one fails at Validate and never reaches the store) ->
      errors.Is(err, errBoom), and NOTHING ELSE.
      TestListStoreError: NewTaskService(failStore{}), List -> errors.Is(err,
      errBoom), and NOTHING ELSE.
      IN THOSE LAST TWO, THE ERROR IS THE RESULT, NOT AN OBSTACLE: do NOT open them
      with the happy-path boilerplate `if err != nil { t.Fatalf(...) }`. That guard
      fires on the very error you asked for and the errors.Is assertion below it
      becomes DEAD CODE. The only check is the errors.Is one:
        _, err := svc.List(context.Background(), 1, 0, "")
        if !errors.Is(err, errBoom) { tt.Fatalf("List: err = %v, want errBoom", err) }
      FINALLY, at PACKAGE SCOPE — outside every function, like any other top-level
      declaration (Go forbids a method declaration inside a function body) —
      declare the failing fake store that those last two tests use:
        var errBoom = errors.New("boom")
        type failStore struct{}
        func (failStore) CreateTask(ctx context.Context, tk models.Task) error { return errBoom }
        func (failStore) GetTask(ctx context.Context, id string) (models.Task, error) { return models.Task{}, errBoom }
        func (failStore) ListTasks(ctx context.Context) ([]models.Task, error) { return nil, errBoom }
        func (failStore) DeleteTask(ctx context.Context, id string) error { return errBoom }
        func (failStore) CreateProject(ctx context.Context, p models.Project) error { return errBoom }
        func (failStore) GetProject(ctx context.Context, id string) (models.Project, error) { return models.Project{}, errBoom }
        func (failStore) ListProjects(ctx context.Context) ([]models.Project, error) { return nil, errBoom }
        func (failStore) DeleteProject(ctx context.Context, id string) error { return errBoom }
      A declared-but-unused failStore means you dropped the last two tests. Go will
      not complain — an unused type compiles — so the suite goes GREEN with two
      tests missing and the store-error branches never executed. Count them: SEVEN.
      Imports context, errors, testing, and the store + models packages. Never
      name a local variable `t`.
  - path: internal/api/response.go
    purpose: >-
      package api. Helpers: writeJSON(w http.ResponseWriter, status int, v any)
      (sets application/json, encodes); writeError(w, status int, msg string)
      (JSON {"error": msg}); decodeJSON(r *http.Request, dst any) error. Imports
      encoding/json, net/http only.
  - path: internal/api/middleware.go
    purpose: >-
      package api. Middleware type func(http.Handler) http.Handler and Chain(h,
      mws ...Middleware) (first listed outermost). Logging(logger *slog.Logger)
      logs method/path/status(via a statusRecorder wrapping ResponseWriter,
      default 200)/duration with structured slog. Recover(logger *slog.Logger)
      turns a downstream panic into 500 and logs it. Imports log/slog, net/http,
      time.
  - path: internal/api/tasks.go
    purpose: >-
      package api. TaskHandler holding a service.TaskService (import the service
      package; hold the INTERFACE by value, never a pointer), built by
      NewTaskHandler(svc service.TaskService) *TaskHandler. Methods
      (http.HandlerFunc) pass r.Context() as the ctx to every svc call and use
      response helpers, r.PathValue("id") and r.URL.Query() for
      ?limit=&offset=&status=: Create (decodeJSON a models.Task ->
      svc.Create(r.Context(), t); 400 on models.ErrInvalid via errors.Is, 201
      with the created task, 409 on store.ErrExists); List (parse limit/offset
      with strconv defaulting/clamping, svc.List(r.Context(), ...), 200 JSON);
      Get (svc.Get(r.Context(), id); 200 or 404 on store.ErrNotFound); Delete
      (204 or 404). Imports errors, net/http, strconv, and the service + models +
      store packages.
  - path: internal/api/projects.go
    purpose: >-
      package api. ProjectHandler holding service.ProjectService (by value),
      NewProjectHandler(svc service.ProjectService) *ProjectHandler, passing
      r.Context() as the ctx to every svc call: Create (400 on ErrInvalid, 201,
      409 on store.ErrExists), List (limit/offset, 200), Get (200/404), Delete
      (204/404). Reuse response helpers. Imports errors, net/http, strconv, and
      the service + models + store packages.
  - path: internal/api/router.go
    purpose: >-
      package api. func NewRouter(ts service.TaskService, ps service.ProjectService,
      logger *slog.Logger) http.Handler building an http.ServeMux (NOT a
      third-party router), constructing the handlers, and registering Go 1.22
      METHOD+pattern routes (never a bare pattern twice): "POST /tasks",
      "GET /tasks", "GET /tasks/{id}", "DELETE /tasks/{id}", the same four for
      /projects, plus "GET /healthz" -> 200 "ok" and "GET /readyz" -> 200
      "ready". Wrap with Chain(mux, Logging(logger), Recover(logger)). Imports
      log/slog, net/http, and the service package.
  - path: internal/api/router_test.go
    purpose: >-
      package api. Integration tests (net/http/httptest). This file contains ELEVEN
      top-level declarations: the newRouter helper, and TEN test functions. WRITE
      ALL ELEVEN — the helper is the one most easily skipped, because it is shown
      to you below and reads like something that already exists. It does not: this
      file is the only place it is declared, and every test calls it.
      Declare ONCE at package scope EXACTLY this helper — it returns http.Handler
      and it does NOT type-assert:
        func newRouter() http.Handler {
            return NewRouter(
                service.NewTaskService(store.NewMemStore()),
                service.NewProjectService(store.NewMemStore()),
                slog.New(slog.NewTextHandler(io.Discard, nil)),
            )
        }
      NewRouter is WRAPPED IN MIDDLEWARE — Chain returns an http.HandlerFunc, not
      the mux — so writing `func newRouter() *http.ServeMux` and returning
      `NewRouter(...).(*http.ServeMux)` PANICS at runtime: `interface conversion:
      http.Handler is http.HandlerFunc, not *http.ServeMux`. Every test only ever
      calls h.ServeHTTP(...), which http.Handler already provides; nothing here
      needs the mux.
      Write SEPARATE FOCUSED TEST FUNCTIONS — NOT one shared table loop. Every
      function calls newRouter() for its own fresh router+store, and builds a
      FRESH request body for every request.
      CRITICAL: a fresh store is EMPTY, so any case with a precondition must
      CREATE that precondition ITSELF by POSTing first — a "duplicate" or an
      "existing task" cannot exist on a store nobody has written to. Write exactly
      these, each self-contained:
      TestCreateOK: POST a valid task -> 201 and the body echoes it.
      TestCreateInvalidStatus: POST a task with a bad status -> 400.
      TestCreateDuplicate: POST the task ONCE (expect 201), then POST THE SAME id
      AGAIN -> 409. (Without the first POST there is nothing to duplicate.)
      TestGetMissing: on a fresh router, GET an id nobody created -> 404.
      TestGetExisting: POST a task FIRST (expect 201), then GET that same id ->
      200 with the stored fields.
      TestList: POST one task FIRST, then GET the collection -> 200 and a JSON
      array.
      TestListLimit: POST TWO tasks FIRST with ids OUT OF ORDER — id "2" then id "1" —
      GET the collection and json-decode it into a slice named `all` (length 2); assert
      all[0].ID == "1" and all[1].ID == "2": the store returns tasks id-sorted, so the
      order is 1,2 regardless of insertion order — without this a store that skips its
      ListTasks sort ships green. Then make a SECOND request with
      ?limit=1, using a FRESH recorder, and json-decode THAT response into a
      SEPARATE slice named `limited` before asserting len(limited) == 1 — EXACTLY
      one, NEVER "at most one": a handler that wrongly returns ZERO items
      satisfies "<= 1" and the bug ships green. Do NOT
      re-assert on `all` beyond the id-order check above.
      TestDelete: POST a task FIRST, DELETE it -> 204, then GET it -> 404.
      TestMalformedJSON: POST truncated bytes like `{"title":` (NOT an empty `{}`)
      -> 400.
      That is TEN test functions and NO more — the project endpoints are covered
      in projects_test.go, in this same package. Do not write them here.
      Imports bytes, encoding/json, io, log/slog, net/http,
      net/http/httptest, testing, and the service + store + models packages.
      Never name a local variable `t`.
  - path: internal/api/projects_test.go
    purpose: >-
      package api. The project endpoints, in their OWN file so that neither test
      file has to be long. They are a MIRROR of the task endpoints: registered on
      the same router, shipped in projects.go, and — until this file existed —
      barely executed at all (List and Delete were never called once). A mirror
      nobody runs is a branch nobody has shown to work.
      The zero-argument helper `newRouter()` is ALREADY declared at package scope
      in router_test.go, in this same package. CALL it. Do NOT declare it again
      (a second declaration is a compile error).
      Every function builds its OWN fresh router, so a case with a precondition
      must POST that precondition ITSELF first. Build each request inline with
      httptest.NewRequest and a FRESH httptest.NewRecorder per call (a request body
      is a one-shot reader). Each is its own function and asserts ONE outcome:
      EIGHT test functions, all of them:
      EVERY project POST body carries a CLIENT-SUPPLIED id — the API does not
      generate them. Always send both fields: `{"id":"1","name":"p1"}`.
      TestProjectCreateGet: POST `{"id":"1","name":"p1"}` -> 201, and the response
      body echoes BOTH fields back: ID is "1" and Name is "p1". Then GET
      /projects/1 -> 200, with ID "1" and Name "p1".
      TestProjectCreateInvalid: POST a project with an EMPTY name -> 400.
      TestProjectMalformedJSON: POST truncated bytes like `{"name":` -> 400.
      TestProjectCreateDuplicate: POST the project ONCE (expect 201), then POST
      THE SAME id AGAIN -> 409.
      TestProjectGetMissing: GET a project id nobody created -> 404.
      TestProjectList: POST ONE project FIRST, then GET the collection -> 200 and
      a JSON array holding EXACTLY 1 project.
      TestProjectDelete: POST a project FIRST, DELETE it -> 204, then GET it ->
      404.
      TestProjectDeleteMissing: DELETE a project id nobody created -> 404.
      Imports bytes, encoding/json, net/http, net/http/httptest, testing, and the
      models package. Never name a local variable `t`.
  - path: internal/api/middleware_test.go
    purpose: >-
      package api. ONE test for the middleware whose entire job is to run when
      everything else has already failed — and which, until now, no test has ever
      made run.
      TestRecoverPanic: do NOT build a router. Wrap a handler that does nothing but
      panic DIRECTLY in Recover, exactly like this (the whole handler is declared
      INLINE, inside the test body — it is a func VALUE, not a method declaration):
        h := Recover(slog.New(slog.NewTextHandler(io.Discard, nil)))(
            http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) { panic("boom") }))
      then ServeHTTP it with httptest.NewRequest("GET", "/", nil) and
      httptest.NewRecorder(), and assert the recorder's Code is 500: the panic must
      be turned into a response, NOT escape out of ServeHTTP.
      Imports io, log/slog, net/http, net/http/httptest, testing. Never name a
      local variable `t`.
  - path: cmd/server/main.go
    purpose: >-
      package main — composition root. Import config, store, service, api and
      log/slog. main(): logger := slog.New(slog.NewJSONHandler(os.Stdout, nil));
      cfg := config.Load(); if err := cfg.Validate(); err != nil log and exit; s
      := store.NewMemStore(); ts := service.NewTaskService(s); ps :=
      service.NewProjectService(s); handler := api.NewRouter(ts, ps, logger);
      build *http.Server{Addr: cfg.Addr, Handler, ReadTimeout, WriteTimeout};
      run in a goroutine; graceful shutdown on os.Interrupt via
      signal.NotifyContext + srv.Shutdown(context.WithTimeout(cfg.ShutdownTimeout)).
      Log lifecycle with slog. Imports context, log/slog, net/http, os,
      os/signal, time, and the four internal packages.
