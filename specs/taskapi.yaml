name: taskapi
language: go
go_module: guildlm.dev/taskapi
description: >-
  A real, production-shaped, STANDARD-LIBRARY-ONLY Go backend laid out as a
  proper multi-package project (cmd/ + internal/), the way an experienced Go
  engineer structures a service. No external dependencies whatsoever: net/http
  with its Go 1.22 ServeMux method routing, log/slog for STRUCTURED logging,
  context for cancellation, encoding/json, sync. Clean layering with
  dependency injection: config -> models -> store (repository interface + memory
  impl) -> api (handlers + middleware + router) -> cmd/server (composition
  root). Each package has ONE clear responsibility; packages depend inward only.
  Cross-package symbols are used by importing the package and qualifying them
  (models.Task, store.Store, store.ErrNotFound). Only exported (capitalised)
  names cross package boundaries.
files:
  - path: go.mod
    purpose: >-
      Go module file. Module path guildlm.dev/taskapi, go 1.23. No dependencies.
      Output as a ```mod block, not Go.
  - path: internal/config/config.go
    purpose: >-
      package config. A Config struct { Addr string; ReadTimeout, WriteTimeout,
      ShutdownTimeout time.Duration } and func Load() Config — it returns the
      Config and NOTHING ELSE (no error). Read EXACTLY these env vars, by these
      names: ADDR, READ_TIMEOUT, WRITE_TIMEOUT, SHUTDOWN_TIMEOUT. Defaults:
      Addr ":8080", ReadTimeout 5s, WriteTimeout 10s, ShutdownTimeout 10s.
      Treat an EMPTY env var EXACTLY like an UNSET one — fall back to the default.
      Parse durations with time.ParseDuration and be DEFENSIVE: if a value fails
      to parse, fall back to that field's default rather than panicking or
      returning a zero duration. Self-contained: imports only os and time. No
      other project package.
  - path: internal/config/config_test.go
    purpose: >-
      package config. Load() is the seam every deployment goes through and it is
      currently never executed by a test at all.
      Write SEPARATE FOCUSED TEST FUNCTIONS. Load() returns ONE value (a Config)
      and NO error — write `cfg := Load()`, never `cfg, err := Load()`.
      Use t.Setenv (never os.Setenv) so the environment is restored afterwards;
      a test that calls t.Setenv must NOT call t.Parallel.
      TestLoadDefaults: t.Setenv ADDR, READ_TIMEOUT, WRITE_TIMEOUT and
      SHUTDOWN_TIMEOUT each to "" — Load treats an EMPTY var as UNSET — then
      Load() returns Addr ":8080", ReadTimeout 5s, WriteTimeout 10s,
      ShutdownTimeout 10s.
      TestLoadFromEnv: t.Setenv ADDR ":9090", READ_TIMEOUT "30s", WRITE_TIMEOUT
      "40s" and SHUTDOWN_TIMEOUT "50s"; Load() returns Addr ":9090", ReadTimeout
      30s, WriteTimeout 40s and ShutdownTimeout 50s. Assert all FOUR — the three
      duration vars are MIRRORS of one another and a mirror nobody exercises is a
      branch nobody has shown to work.
      TestLoadInvalidDurationFallsBack: t.Setenv READ_TIMEOUT, WRITE_TIMEOUT and
      SHUTDOWN_TIMEOUT ALL to "not-a-duration"; Load() falls back to EACH field's
      own default (5s, 10s, 10s). It must NOT panic and must NOT leave any of them
      at 0 — an unparseable value is not a zero timeout. Assert all three.
      Compare durations against time.Second multiples (e.g. 5*time.Second), never
      against integers. Imports testing and time only. Do not name any local
      variable `t`.
  - path: internal/models/models.go
    purpose: >-
      package models. Domain types and their validation. Task struct {ID,
      Title, Status, ProjectID string} and Project struct {ID, Name string},
      all with JSON tags. Valid Task.Status is "todo"|"doing"|"done". A sentinel
      var ErrInvalid = errors.New("invalid") (exported, matchable with
      errors.Is). Methods (t Task) Validate() error and (p Project) Validate()
      error that wrap ErrInvalid via fmt.Errorf("%w: ...") when Title/Name is
      empty or Status is not allowed. Imports only errors, fmt. No other project
      package.
  - path: internal/models/models_test.go
    purpose: >-
      package models. Unit-test the validation rules directly — they are the
      domain's contract and every other package trusts them.
      Write SEPARATE FOCUSED TEST FUNCTIONS.
      ONE TEST FUNCTION, ONE OUTCOME. Every case inside a function must expect the
      SAME KIND of result, because the assertion is SHARED: a function whose check
      is "the error must be non-nil" cannot also carry a case that expects nil —
      that case is unsatisfiable by construction and fails against a CORRECT
      implementation. If you write a table, every row in it expects the same thing.
      TestTaskValidateOK: a Task with a non-empty Title returns nil. Assert that
      for EACH of the three valid statuses "todo", "doing" and "done". Every case
      in this function expects NIL.
      TestTaskValidateEmptyTitle: a Task with an empty Title returns an error that
      errors.Is(err, ErrInvalid).
      TestTaskValidateBadStatus: a Task whose Status is INVALID (e.g. "banana")
      returns an error that errors.Is(err, ErrInvalid). Every case in this function
      expects an ERROR — so NEVER put a valid status ("todo"/"doing"/"done") in it.
      A valid status correctly returns nil and would fail this function's assertion.
      TestProjectValidateOK: a Project with a non-empty Name returns nil.
      TestProjectValidateEmptyName: a Project with an empty Name returns an error
      that errors.Is(err, ErrInvalid).
      Write every struct value with FIELD NAMES. Imports errors and testing only.
  - path: internal/store/store.go
    purpose: >-
      package store. The repository abstraction. Import the models package
      (guildlm.dev/taskapi/internal/models) and use models.Task / models.Project
      (qualified — do NOT redeclare them here). Exported sentinels var
      ErrNotFound and var ErrExists (errors.New, matchable with errors.Is). A
      Store INTERFACE with CreateTask(models.Task) error, GetTask(id string)
      (models.Task, error), ListTasks() []models.Task, DeleteTask(id string)
      error, and the same four for Project. Imports errors and the models
      package only.
  - path: internal/store/memory.go
    purpose: >-
      package store. A goroutine-safe in-memory implementation of the Store
      interface from store.go (same package — reference Store, ErrNotFound,
      ErrExists directly, do NOT redeclare them). MemStore struct holding two
      maps (tasks, projects) keyed by ID guarded by one sync.RWMutex, built by
      NewMemStore() *MemStore. Create returns ErrExists on duplicate id;
      Get/Delete return ErrNotFound; List returns items sorted by ID. Use
      models.Task/models.Project (import the models package). A compile-time
      var _ Store = (*MemStore)(nil) assertion. Imports sort, sync, and the
      models package.
  - path: internal/store/memory_test.go
    purpose: >-
      package store. Tests for MemStore (same package — call NewMemStore, Store
      methods, ErrNotFound, ErrExists directly; use models.Task via the imported
      models package).
      Write SEPARATE FOCUSED TEST FUNCTIONS — NOT one shared table loop. Each
      builds its OWN fresh NewMemStore. A fresh store is EMPTY, so any case with a
      precondition must CREATE it FIRST, in its own body:
      TestCreateOK: Create -> nil.
      TestCreateDuplicate: Create ONCE (expect nil), then Create the SAME id AGAIN
      -> ErrExists (errors.Is). Without the first create there is nothing to
      duplicate.
      TestGetExisting: Create FIRST, then Get that id -> the stored value.
      TestGetMissing: on a fresh store, Get an unknown id -> ErrNotFound.
      TestListSorted: Create two tasks, then List -> id-sorted.
      TestDelete: Create FIRST, Delete -> nil, then Get -> ErrNotFound.
      TestDeleteMissing: on a fresh store, Delete an unknown id -> ErrNotFound.
      Then the SAME seven cases for the PROJECT half of the store, which is
      currently never exercised at all — the store is exactly 50% covered because
      these methods are never called, and a method nobody calls is a method nobody
      has shown to be correct:
      TestCreateProjectOK, TestCreateProjectDuplicate (create ONCE, then the SAME
      id again -> ErrExists), TestGetProjectExisting (create FIRST, then get),
      TestGetProjectMissing (-> ErrNotFound), TestListProjectsSorted (create two,
      then list id-sorted), TestDeleteProject (create FIRST, delete, then get ->
      ErrNotFound), TestDeleteProjectMissing (-> ErrNotFound). Each builds its OWN
      fresh NewMemStore and seeds its own precondition, exactly as above.
      Run race-clean. Imports errors, testing, and the models package.
  - path: internal/api/response.go
    purpose: >-
      package api. Small HTTP/JSON helpers reused by every handler: writeJSON(w
      http.ResponseWriter, status int, v any) sets Content-Type application/json
      and encodes v; writeError(w http.ResponseWriter, status int, msg string)
      writes a JSON {"error": msg}; decodeJSON(r *http.Request, dst any) error
      decodes the body and returns an error on malformed input. Imports
      encoding/json, net/http only. No other project package.
  - path: internal/api/middleware.go
    purpose: >-
      package api. Middleware type func(http.Handler) http.Handler and Chain(h
      http.Handler, mws ...Middleware) http.Handler where the first listed is
      outermost. A Logging(logger *slog.Logger) Middleware that logs method,
      path, resolved status (via a statusRecorder wrapping http.ResponseWriter,
      default 200) and duration using STRUCTURED log/slog (logger.Info with
      slog attributes). A Recover(logger *slog.Logger) Middleware turning a
      downstream panic into a 500 and logging it. Imports log/slog, net/http,
      time. No other project package.
  - path: internal/api/tasks.go
    purpose: >-
      package api. TaskHandler struct holding a store.Store (import the store
      package; hold the INTERFACE by value, never *store.Store), built by
      NewTaskHandler(s store.Store) *TaskHandler. http.HandlerFunc methods using
      the response helpers and r.PathValue("id"): Create (decodeJSON a
      models.Task, call its Validate() returning 400 on ErrInvalid via
      errors.Is, then store.CreateTask returning 201, or 409 on store.ErrExists);
      Get (200 or 404 on store.ErrNotFound); List (200 with the slice as JSON);
      Delete (204 or 404). Imports errors, net/http, and the store + models
      packages.
  - path: internal/api/projects.go
    purpose: >-
      package api. ProjectHandler mirroring TaskHandler for projects: holds
      store.Store (by value), NewProjectHandler(s store.Store) *ProjectHandler,
      with Create (validate->400, CreateProject->201, 409 on store.ErrExists),
      Get (200/404), List (200), Delete (204/404). Reuse the response helpers.
      Imports errors, net/http, and the store + models packages.
  - path: internal/api/router.go
    purpose: >-
      package api. func NewRouter(s store.Store, logger *slog.Logger)
      http.Handler that builds an http.ServeMux (NOT a third-party router),
      constructs the task and project handlers with s, and registers Go 1.22
      METHOD+pattern routes (never a bare pattern twice): "POST /tasks",
      "GET /tasks", "GET /tasks/{id}", "DELETE /tasks/{id}", the same four for
      /projects, and "GET /healthz" -> 200 "ok". Wrap the mux with Chain(mux,
      Logging(logger), Recover(logger)) and return it. Imports log/slog,
      net/http, and the store package.
  - path: internal/api/router_test.go
    purpose: >-
      package api. Integration tests (net/http/httptest) against NewRouter(
      store.NewMemStore(), slog.New(slog.NewTextHandler(io.Discard, nil))).
      Import the store + models packages.
      Write SEPARATE FOCUSED TEST FUNCTIONS — NOT one shared table loop. Every
      function builds its OWN fresh router+store via a zero-argument helper
      `newRouter()` declared once at package scope, and a FRESH request body for
      every request (never reuse a drained buffer).
      CRITICAL: a fresh store is EMPTY, so any case with a precondition must
      CREATE that precondition ITSELF by POSTing first — a "duplicate" or an
      "existing task" cannot exist on a store nobody has written to. Each of
      these is its own function, self-contained:
      TestCreateOK: POST a valid task -> 201 and the body echoes it.
      TestCreateInvalid: POST a task with a bad status -> 400.
      TestCreateDuplicate: POST the task ONCE (expect 201), then POST THE SAME id
      AGAIN -> 409. (Without the first POST there is nothing to duplicate.)
      TestGetMissing: on a fresh router, GET an id nobody created -> 404.
      TestGetExisting: POST a task FIRST (expect 201), then GET that same id ->
      200 with the stored fields.
      TestList: POST one task FIRST, then GET the collection -> 200 and a JSON
      array.
      TestDelete: POST a task FIRST, DELETE it -> 204, then GET it -> 404.
      TestMalformedJSON: POST truncated bytes like `{"title":` (NOT an empty
      `{}`) -> 400.
      TestDeleteMissing: DELETE a task id nobody created -> 404.
      TestHealthz: GET /healthz -> assert the STATUS CODE is 200. The body is the
      bare JSON string "ok" — NOT an object: if you check it at all, decode it
      into a `string`, never into a struct (a struct decode of a bare string
      silently yields the zero value and fails a handler that is working).
      That is TEN test functions and NO more — the project endpoints are covered
      in projects_test.go, in this same package. Do not write them here.
      Imports bytes, encoding/json, io, log/slog, net/http, net/http/httptest,
      testing, and store + models.
  - path: internal/api/projects_test.go
    purpose: >-
      package api. The project endpoints, in their OWN file so that neither test
      file has to be long. They are a MIRROR of the task endpoints: registered on
      the same router, shipped in projects.go, and — until this file existed —
      never once executed by a test. A mirror nobody runs is a branch nobody has
      shown to work.
      The zero-argument helper `newRouter()` is ALREADY declared at package scope
      in router_test.go, in this same package. CALL it. Do NOT declare it again
      (a second declaration is a compile error).
      Every function builds its OWN fresh router, so a case with a precondition
      must POST that precondition ITSELF first. Each is its own function, and each
      asserts ONE outcome and nothing else:
      TestProjectCreateGet: POST a project (expect 201), then GET it back -> 200
      and the stored name.
      TestProjectCreateInvalid: POST a project with an EMPTY name -> 400.
      TestProjectMalformedJSON: POST truncated bytes like `{"name":` -> 400.
      TestProjectCreateDuplicate: POST the project ONCE (expect 201), then POST
      THE SAME id AGAIN -> 409.
      TestProjectGetMissing: GET a project id nobody created -> 404.
      TestProjectList: POST ONE project FIRST, then GET the collection -> 200 and
      a JSON array holding EXACTLY 1 project.
      TestProjectDelete: POST a project FIRST, DELETE it -> 204, then GET it ->
      404.
      TestProjectDeleteMissing: DELETE a project id nobody created -> 404.
      Build each request inline with httptest.NewRequest + a FRESH
      httptest.NewRecorder per call (a request body is a one-shot reader).
      Imports bytes, encoding/json, net/http, net/http/httptest, testing, and the
      models package. Never name a local variable `t`.
  - path: internal/api/middleware_test.go
    purpose: >-
      package api. ONE test for the middleware whose entire job is to run when
      everything else has already failed — and which, until now, no test has ever
      made run.
      TestRecoverPanic: do NOT build a router. Wrap a handler that does nothing but
      panic DIRECTLY in Recover, exactly like this (the whole handler is declared
      INLINE, inside the test body — it is a func VALUE, not a method declaration):
        h := Recover(slog.New(slog.NewTextHandler(io.Discard, nil)))(
            http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) { panic("boom") }))
      then ServeHTTP it with httptest.NewRequest("GET", "/", nil) and
      httptest.NewRecorder(), and assert the recorder's Code is 500: the panic must
      be turned into a response, NOT escape out of ServeHTTP.
      Imports io, log/slog, net/http, net/http/httptest, testing. Never name a
      local variable `t`.
  - path: cmd/server/main.go
    purpose: >-
      package main — the composition root. Import config, store, api (their full
      module paths) and log/slog. func main() builds logger :=
      slog.New(slog.NewJSONHandler(os.Stdout, nil)), cfg := config.Load(), s :=
      store.NewMemStore(), handler := api.NewRouter(s, logger); constructs an
      *http.Server{Addr: cfg.Addr, Handler: handler, ReadTimeout/WriteTimeout
      from cfg}; runs it in a goroutine; and shuts down gracefully on
      os.Interrupt via signal.NotifyContext + srv.Shutdown with a
      context.WithTimeout(cfg.ShutdownTimeout). Log lifecycle events with slog.
      Imports context, errors, log/slog, net/http, os, os/signal, time, and the
      three internal packages.
